services:
  mongo:
    image: mongo:6.0
    container_name: energy_mongo
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongo_data:/data/db
    networks:
      - energy_network

  postgres:
    image: postgres:15
    container_name: energy_postgres
    restart: always
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - energy_network

  redis:
    image: redis:7-alpine
    container_name: energy_redis
    restart: always
    networks:
      - energy_network

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: energy_airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      MONGO_URI: mongodb://admin:admin123@mongo:27017/energy_platform?authSource=admin
      MONGO_DB_NAME: energy_platform
      OILPRICE_API_KEY: ${OILPRICE_API_KEY}
      OILPRICE_BASE_URL: ${OILPRICE_BASE_URL:-https://api.oilpriceapi.com/v1}
      OILPRICE_REQUEST_TIMEOUT: ${OILPRICE_REQUEST_TIMEOUT:-30}
      OILPRICE_MAX_RETRIES: ${OILPRICE_MAX_RETRIES:-3}
      OILPRICE_RETRY_DELAY: ${OILPRICE_RETRY_DELAY:-5}
      BATCH_SIZE: ${BATCH_SIZE:-1000}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-5}
      SECRET_KEY: $${SECRET_KEY:-your-secret-key-here}
    entrypoint: /bin/bash
    command: >
      -c "airflow db init &&
          airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./config:/opt/airflow/config
    networks:
      - energy_network

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: energy_airflow_webserver
    user: "0:0"
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow:/opt/airflow/app:/opt/airflow/config
      MONGO_URI: mongodb://admin:admin123@mongo:27017/energy_platform?authSource=admin
      MONGO_DB_NAME: energy_platform
      OILPRICE_API_KEY: ${OILPRICE_API_KEY}
      OILPRICE_BASE_URL: ${OILPRICE_BASE_URL:-https://api.oilpriceapi.com/v1}
      OILPRICE_REQUEST_TIMEOUT: ${OILPRICE_REQUEST_TIMEOUT:-30}
      OILPRICE_MAX_RETRIES: ${OILPRICE_MAX_RETRIES:-3}
      OILPRICE_RETRY_DELAY: ${OILPRICE_RETRY_DELAY:-5}
      BATCH_SIZE: ${BATCH_SIZE:-1000}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-5}
      SECRET_KEY: $${SECRET_KEY:-your-secret-key-here}
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
    command: webserver
    networks:
      - energy_network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: energy_airflow_scheduler
    user: "0:0"
    restart: always
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      PYTHONPATH: /opt/airflow:/opt/airflow/app:/opt/airflow/config
      MONGO_URI: mongodb://admin:admin123@mongo:27017/energy_platform?authSource=admin
      MONGO_DB_NAME: energy_platform
      OILPRICE_API_KEY: ${OILPRICE_API_KEY}
      OILPRICE_BASE_URL: ${OILPRICE_BASE_URL:-https://api.oilpriceapi.com/v1}
      OILPRICE_REQUEST_TIMEOUT: ${OILPRICE_REQUEST_TIMEOUT:-30}
      OILPRICE_MAX_RETRIES: ${OILPRICE_MAX_RETRIES:-3}
      OILPRICE_RETRY_DELAY: ${OILPRICE_RETRY_DELAY:-5}
      BATCH_SIZE: ${BATCH_SIZE:-1000}
      MAX_RETRIES: ${MAX_RETRIES:-3}
      RETRY_DELAY_SECONDS: ${RETRY_DELAY_SECONDS:-5}
      SECRET_KEY: $${SECRET_KEY:-your-secret-key-here}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./app:/opt/airflow/app
      - ./config:/opt/airflow/config
      - ./logs:/opt/airflow/logs
    command: scheduler
    networks:
      - energy_network

  flask-app:
    build:
      context: .
      dockerfile: Dockerfile.flask
    container_name: energy_flask
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - FLASK_ENV=${FLASK_ENV:-development}
      - FLASK_PORT=${FLASK_PORT:-5000}
      - SECRET_KEY=${SECRET_KEY}
      - OILPRICE_API_KEY=${OILPRICE_API_KEY}
      - OILPRICE_BASE_URL=${OILPRICE_BASE_URL:-https://api.oilpriceapi.com/v1}
      - OILPRICE_REQUEST_TIMEOUT=${OILPRICE_REQUEST_TIMEOUT:-30}
      - OILPRICE_MAX_RETRIES=${OILPRICE_MAX_RETRIES:-3}
      - OILPRICE_RETRY_DELAY=${OILPRICE_RETRY_DELAY:-5}
      - BATCH_SIZE=${BATCH_SIZE:-1000}
      - MAX_RETRIES=${MAX_RETRIES:-3}
      - RETRY_DELAY_SECONDS=${RETRY_DELAY_SECONDS:-5}
    volumes:
      - ./flask_app:/app/flask_app
      - ./app:/app/app
      - ./config:/app/config
    depends_on:
      - mongo
    networks:
      - energy_network

volumes:
  mongo_data:
  postgres_data:

networks:
  energy_network:
    driver: bridge